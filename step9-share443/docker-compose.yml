services:
  nginx:
    build:
      context: ./nginx
      args:
        NGINX_SITE: prod
    container_name: step9-share443-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server

  server:
    build:
      context: ./server
    container_name: step9-share443-server
    expose:
      - "4000"
    env_file:
      - ./server/.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: step9-share443-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7.0-alpine
    container_name: step9-share443-redis
    ports:
      - "6379:6379"
