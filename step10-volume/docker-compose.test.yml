# 与 docker-compose.yml 并行运行：须配合 start-test.sh 的 -p step9-test
# 宿主机端口与生产错开：HTTP 8080、HTTPS 8443、MySQL 3307、Redis 6380
# --env-file ./server/.env.test：与 .env.prod 同字段，供 mysql 与变量替换

services:
  nginx:
    build:
      context: ./nginx
      args:
        NGINX_SITE: test
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/ssl/cert:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - server

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7.0-alpine
    ports:
      - "6380:6379"

  server:
    build:
      context: ./server
    expose:
      - "4000"
    env_file:
      - ./server/.env.test
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
