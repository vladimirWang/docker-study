# main 分支 / 生产：www.hetou.vip、根域名 hetou.vip
# SSL：ssl/www.hetou.vip.pem、www.hetou.vip.key

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:4000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name www.hetou.vip hetou.vip;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.hetou.vip hetou.vip;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/ssl/cert/www.hetou.vip.pem;
    ssl_certificate_key /etc/ssl/cert/www.hetou.vip.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:4000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name 139.224.68.145;

    ssl_certificate     /etc/ssl/cert/www.hetou.vip.pem;
    ssl_certificate_key /etc/ssl/cert/www.hetou.vip.key;

    return 301 https://www.hetou.vip$request_uri;
}
