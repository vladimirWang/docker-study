services:
  nginx:
    build:
      context: ../nginx
      args:
        NGINX_SITE: prod
    volumes:
      - ../nginx/html/dist:/usr/share/nginx/html:ro
      - ../nginx/ssl:/etc/ssl/cert:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server

  server:
    build:
      context: ../server
    expose:
      - "4000"
    env_file:
      - ../server/.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command:
      ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
