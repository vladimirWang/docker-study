worker_processes auto;
events { }
http {
    # 加载MIME类型，确保浏览器正确识别文件
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name www.hetou.vip hetou.vip;
        
        location / {
            return 301 https://$host$request_uri;
        }

        # location / {
        #     # 直接返回 200 状态码和文本内容
        #     default_type text/html;
        #     return 200 "<h1>Hello, Nginx on Alpine!</h1>";
        # }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.hetou.vip hetou.vip;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/ssl/cert/www.hetou.vip.pem;
        ssl_certificate_key /etc/ssl/cert/www.hetou.vip.key;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
    }
}