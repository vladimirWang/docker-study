worker_processes auto;
events { }
http {
    # 加载MIME类型，确保浏览器正确识别文件
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 本地/未知 Host（例如 localhost、IP）走 HTTP：直接提供前端 + /api 反代
    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 反向代理：把 /api/* 转发到 server 容器（Express:4000）
	#location /api/ {
	#   proxy_set_header Host $host;
	#   proxy_set_header X-Real-IP $remote_addr;
	#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	#   proxy_set_header X-Forwarded-Proto $scheme;

	#   proxy_pass http://server:4000/;
	#}

        # 前端单页应用：不存在的路径回退到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 80;
        server_name www.hetou.vip hetou.vip;
        
        # 线上域名访问 80：强制跳转到 https
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name www.hetou.vip hetou.vip;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/ssl/cert/www.hetou.vip.pem;
        ssl_certificate_key /etc/ssl/cert/www.hetou.vip.key;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;

        # 反向代理：把 /api/* 转发到 server 容器（Express:4000）
	#location /api/ {
	#   proxy_set_header Host $host;
	#   proxy_set_header X-Real-IP $remote_addr;
	#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	#   proxy_set_header X-Forwarded-Proto $scheme;

	#   proxy_pass http://server:4000/;
	#}

        # 前端单页应用：不存在的路径回退到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 443 ssl;
        server_name 139.224.68.145;

        ssl_certificate     /etc/ssl/cert/www.hetou.vip.pem;
        ssl_certificate_key /etc/ssl/cert/www.hetou.vip.key;
        
        return 301 https://www.hetou.vip$request_uri;
    }
}
