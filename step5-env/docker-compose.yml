services:
  nginx:
    build:
      context: ./nginx
    container_name: step5-env-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server

  server:
    build:
      context: ./server
    container_name: step5-env-server
    expose:
      - "4000"
    env_file:
      - ./server/.env.prod


  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
